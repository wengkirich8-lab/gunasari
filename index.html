<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Peta Drone Gunasari - Leaflet Alternative CDN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Menggunakan Cloudflare CDN (Sangat aman dari blokir jaringan internet) -->
    <link rel="stylesheet" href="https://cloudflare.comUse code with caution.html" />
    <script src="https://cloudflare.comUse "></script>

    <style>
        html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Memastikan Leaflet berhasil dimuat dari server Cloudflare
        if (typeof L !== 'undefined') {
            
            // 1. Mengatur posisi tengah kamera ke lokasi drone Anda di Gunasari
            var map = L.map('map').setView([-7.332306, 108.384666], 17);

            // 2. Memasang Peta Dasar Satelit Bumi dari Esri (Bebas Error Google)
            L.tileLayer('https://arcgisonline.com{z}/{y}/{x}', {
                maxZoom: 19,
                attribution: 'Tiles &copy; Esri'
            }).addTo(map);

            // 3. Menghubungkan Formula Koordinat Global Mapper ke Leaflet
            L.TileLayer.GlobalMapper = L.TileLayer.extend({
                getTileUrl: function(coords) {
                    var z = coords.z;
                    var x = coords.x;
                    var y = coords.y;
                    
                    if (z == 17 && x >= 105004 && x <= 105005 && y >= 68164 && y <= 68165) {
                        return "./Z" + z + "/" + y + "/" + x + ".png";
                    } else if (z == 18 && x >= 210008 && x <= 210011 && y >= 136328 && y <= 136331) {
                        return "./Z" + z + "/" + y + "/" + x + ".png";
                    } else if (z == 19 && x >= 420016 && x <= 420023 && y >= 272656 && y <= 272662) {
                        return "./Z" + z + "/" + y + "/" + x + ".png";
                    }
                    return L.Util.emptyImageUrl;
                }
            });

            // 4. Menampilkan Lapisan Foto Udara Drone Anda di Atas Peta Satelit
            var droneLayer = new L.TileLayer.GlobalMapper('', {
                minZoom: 17,
                maxZoom: 19,
                opacity: 1.0
            });
            droneLayer.addTo(map);

        } else {
            document.body.innerHTML = "<h2 style='text-align:center;margin-top:20%;color:red;'>Jaringan internet Anda memblokir pustaka peta. Coba gunakan VPN atau ganti koneksi internet (Hotspot HP).</h2>";
        }
    </script>
</body>
</html>
