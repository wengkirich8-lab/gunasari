<!DOCTYPE html>
<html>
<head>
    <title>Peta Drone Gunasari - Leaflet</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Memanggil Pustaka Leaflet CSS dan JS -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Mengatur titik tengah peta awal ke wilayah Gunasari / Cintanagara Anda
        var map = L.map('map').setView([-7.332306, 108.384666], 17);

        // Menggunakan Peta Dasar OpenStreetMap yang 100% Gratis Tanpa API Key
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Menampilkan Lapisan Foto Udara Drone Anda di atas peta dasar
        // Kode ini otomatis membaca folder Z17, Z18, Z19 di GitHub Anda
        L.tileLayer('./Z{z}/{y}/{x}.png', {
            minZoom: 17,
            maxZoom: 19,
            tms: false, // ubah jadi true jika ubin gambar drone terbalik ke belahan bumi lain
            opacity: 1.0
        }).addTo(map);
    </script>
</body>
</html>
